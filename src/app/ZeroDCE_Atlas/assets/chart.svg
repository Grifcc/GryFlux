<svg width="820" height="780" viewBox="0 0 820 780" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#555" />
    </marker>
    <style>
      .text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; text-anchor: middle; dominant-baseline: middle; font-weight: bold; }
      .sub-text { font-family: 'Consolas', monospace; font-size: 11px; text-anchor: middle; fill: #666; }
      .label-text { font-family: 'Consolas', monospace; font-size: 16px; fill: #E64A19; font-weight: 900; }
      .note-text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 12px; fill: #666; }
      .box { stroke-width: 2; }
      .input-output { fill: #fce4ec; stroke: #880e4f; }
      .npu-box { fill: #e3f2fd; stroke: #1565c0; }
      .add-box { fill: #fff8e1; stroke: #f9a825; }
      .cpu-box { fill: #ccff90; stroke: #388e3c; }
      .line { fill: none; stroke: #555; stroke-width: 1.5; marker-end: url(#arrowhead); }
      .dashed-line { fill: none; stroke: #777; stroke-width: 1.5; stroke-dasharray: 6 4; marker-end: url(#arrowhead); }
    </style>
  </defs>

  <ellipse cx="400" cy="50" rx="60" ry="25" class="box input-output" />
  <text x="400" y="50" class="text">Input</text>

  <rect x="300" y="120" width="200" height="40" rx="5" class="box cpu-box" />
  <text x="400" y="140" class="text">ZeroDceDataSource</text>

  <rect x="300" y="190" width="200" height="40" rx="5" class="box add-box" />
  <text x="400" y="210" class="text">ZeroDcePacket</text>

  <rect x="300" y="260" width="200" height="40" rx="5" class="box cpu-box" />
  <text x="400" y="280" class="text">InputNode</text>

  <rect x="300" y="330" width="200" height="40" rx="5" class="box cpu-box" />
  <text x="400" y="350" class="text">PreprocessNode</text>

  <rect x="300" y="400" width="200" height="40" rx="5" class="box npu-box" />
  <text x="400" y="420" class="text">InferNode</text>

  <rect x="300" y="470" width="200" height="40" rx="5" class="box cpu-box" />
  <text x="400" y="490" class="text">PostprocessNode</text>

  <rect x="300" y="540" width="200" height="40" rx="5" class="box cpu-box" />
  <text x="400" y="560" class="text">OutputNode</text>

  <rect x="300" y="610" width="200" height="40" rx="5" class="box add-box" />
  <text x="400" y="630" class="text">ZeroDceResultConsumer</text>

  <ellipse cx="400" cy="720" rx="60" ry="25" class="box input-output" />
  <text x="400" y="720" class="text">Output</text>

  <rect x="560" y="395" width="170" height="50" rx="5" class="box npu-box" />
  <text x="645" y="414" class="text">AtlasContext x2</text>
  <text x="645" y="432" class="sub-text">device 0 / device 1</text>

  <rect x="560" y="525" width="170" height="50" rx="5" class="box add-box" />
  <text x="645" y="544" class="text">AsyncDiskWriter</text>
  <text x="645" y="562" class="sub-text">Start / Stop only</text>

  <path d="M400,75 L400,120" class="line" />
  <path d="M400,160 L400,190" class="line" />
  <path d="M400,230 L400,260" class="line" />
  <path d="M400,300 L400,330" class="line" />
  <path d="M400,370 L400,400" class="line" />
  <path d="M400,440 L400,470" class="line" />
  <path d="M400,510 L400,540" class="line" />
  <path d="M400,580 L400,610" class="line" />
  <path d="M400,650 L400,695" class="line" />

  <path d="M560,420 L500,420" class="line" />
  <text x="512" y="408" class="label-text">atlas_npu</text>

  <path d="M500,490 L560,550" class="dashed-line" />
  <text x="525" y="535" class="label-text">unused</text>

</svg>
